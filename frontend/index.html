<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MoodFlow Music</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#08080f;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#splash{position:fixed;inset:0;background:#08080f;display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
#splash.hide{opacity:0;pointer-events:none}
#splash h1{font-size:2rem;background:linear-gradient(135deg,#e94560,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#splash .sp{width:32px;height:32px;border:3px solid #2a2a4a;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}

header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#12121e;border-bottom:1px solid #2a2a4a}
header h1{font-size:1.2rem;flex:1;background:linear-gradient(135deg,#e94560,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header button{background:none;border:none;color:#fff;font-size:1.2rem;padding:6px 10px;border-radius:8px;cursor:pointer}

.search-wrap{display:flex;gap:6px;padding:10px 16px}
.search-wrap input{flex:1;padding:10px 14px;border:1px solid #2a2a4a;border-radius:10px;background:#12121e;color:#fff;font-size:14px;outline:none}
.search-wrap input:focus{border-color:#e94560}
.search-wrap button{padding:10px 16px;border:none;border-radius:10px;background:#e94560;color:#fff;cursor:pointer;font-size:14px}

.chips{display:flex;gap:6px;padding:4px 16px;overflow-x:auto;scrollbar-width:none}
.chip{padding:6px 16px;border-radius:20px;background:#1a1a2e;border:1px solid #2a2a4a;font-size:13px;white-space:nowrap;cursor:pointer}
.chip.on{background:#e94560;border-color:#e94560}

#status{padding:8px 16px;font-size:13px;color:#888;min-height:20px}

.list{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;background:#12121e;cursor:pointer;transition:background .2s}
.item:active{background:#1a1a2e}
.item .th{width:40px;height:40px;border-radius:6px;background:#2a2a4a;flex-shrink:0;overflow:hidden}
.item .th img{width:100%;height:100%;object-fit:cover}
.item .info{flex:1;min-width:0}
.item .info .t{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .info .a{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .dur{font-size:11px;color:#666}

.player{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#12121e;border-top:1px solid #2a2a4a}
.player .th{width:36px;height:36px;border-radius:6px;background:#2a2a4a;flex-shrink:0;overflow:hidden}
.player .th img{width:100%;height:100%;object-fit:cover}
.player .info{flex:1;min-width:0}
.player .info .t{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player .info .a{font-size:11px;color:#888}
.player .ctrl{display:flex;gap:4px}
.player .ctrl button{background:none;border:none;color:#fff;font-size:1.3rem;padding:4px 8px;cursor:pointer}
.player .ctrl .pp{color:#e94560;font-size:1.6rem}

.empty{text-align:center;color:#666;padding:2rem;font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #2a2a4a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:100;transition:opacity .3s}
.toast.hide{opacity:0;pointer-events:none}
</style>
</head>
<body>

<div id="splash"><div><h1>MoodFlow</h1><div class="sp"></div><p style="color:#666;font-size:13px;text-align:center;margin-top:4px">Loading...</p></div></div>

<header>
  <h1>MoodFlow</h1>
  <button id="loginBtn" style="font-size:12px;background:#e94560;padding:4px 10px;border-radius:6px">Login</button>
</header>

<div class="search-wrap">
  <input id="searchInput" placeholder="Search any song, artist..." autocomplete="off">
  <button id="searchBtn">Search</button>
</div>

<div class="chips" id="chipBar">
  <span class="chip on" data-q="bollywood hits">Bollywood</span>
  <span class="chip" data-q="punjabi songs">Punjabi</span>
  <span class="chip" data-q="english hits">English</span>
  <span class="chip" data-q="lofi chill">Lofi</span>
  <span class="chip" data-q="workout music">Workout</span>
  <span class="chip" data-q="romantic songs">Romantic</span>
  <span class="chip" data-q="sad songs">Sad</span>
  <span class="chip" data-q="party songs">Party</span>
</div>

<div id="status">Tap a mood or search to find music</div>

<div class="list" id="list"></div>

<div class="player" id="player" style="display:none">
  <div class="th" id="pth"></div>
  <div class="info">
    <div class="t" id="pt">No track</div>
    <div class="a" id="pa">Unknown</div>
  </div>
  <div class="ctrl">
    <button id="prevBtn">&#9664;&#9664;</button>
    <button id="playBtn" class="pp">&#9654;</button>
    <button id="nextBtn">&#9654;&#9654;</button>
  </div>
</div>

<div id="toast" class="toast hide"></div>

<div id="loginScreen" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:2rem">
  <div style="background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:2rem;width:100%;max-width:340px">
    <h2 style="margin-bottom:1rem;text-align:center">Sign In</h2>
    <p id="loginError" style="color:#e94560;font-size:13px;margin-bottom:8px;display:none"></p>
    <input id="loginEmail" type="email" placeholder="Email" style="width:100%;padding:10px;border:1px solid #2a2a4a;border-radius:8px;background:#12121e;color:#fff;margin-bottom:8px;outline:none">
    <input id="loginPass" type="password" placeholder="Password" style="width:100%;padding:10px;border:1px solid #2a2a4a;border-radius:8px;background:#12121e;color:#fff;margin-bottom:12px;outline:none">
    <button id="loginSubmitBtn" style="width:100%;padding:10px;border:none;border-radius:8px;background:#e94560;color:#fff;cursor:pointer;font-size:14px;font-weight:600">Sign In</button>
    <p style="text-align:center;margin-top:10px;font-size:13px;color:#888"><a id="loginToggle" href="#" style="color:#e94560;text-decoration:none">Create account</a></p>
    <button id="loginClose" style="width:100%;margin-top:8px;padding:6px;border:none;border-radius:8px;background:transparent;color:#888;cursor:pointer;font-size:13px">Skip</button>
  </div>
</div>

<script>
// ===== SPLASH HIDE IMMEDIATELY =====
document.getElementById('splash').classList.add('hide');

// ===== STATE =====
let currentTrack=null,playing=false,audio=null,results=[],queue=[],qIdx=0;
let user=null,favs=[],authFirebase=null,dbFirebase=null;
const API='https://pipedapi.kavin.rocks';
const $=id=>document.getElementById(id);
const toast=(msg,t=3000)=>{const e=$('toast');if(!e)return;e.textContent=msg;e.classList.remove('hide');clearTimeout(e._h);e._h=setTimeout(()=>e.classList.add('hide'),t)};
const err=(msg)=>{toast(msg);$('status').textContent=msg};

// ===== SEARCH =====
async function search(q){
  $('status').textContent='Searching...';
  $('list').innerHTML='<div class="empty">Searching...</div>';
  try{
    let r=await fetch(API+'/search?q='+encodeURIComponent(q)+'&filter=videos');
    if(r.status!==200)throw new Error('API error');
    let d=await r.json();
    results=(d.items||[]).map(i=>({id:(i.url||'').split('v=')[1]?.split('&')[0]||'',title:i.title||'Unknown',artist:i.uploaderName||i.uploader||'Unknown',thumb:i.thumbnail||'',dur:i.duration||0}));
    renderList(results);
    $('status').textContent=results.length+' songs found';
  }catch(e){
    // Fallback try alternative Piped instance
    try{
      let r=await fetch('https://pipedapi.syncpundit.io/search?q='+encodeURIComponent(q)+'&filter=videos');
      if(r.status!==200)throw new Error();
      let d=await r.json();
      results=(d.items||[]).map(i=>({id:(i.url||'').split('v=')[1]?.split('&')[0]||'',title:i.title||'Unknown',artist:i.uploaderName||i.uploader||'Unknown',thumb:i.thumbnail||'',dur:i.duration||0}));
      renderList(results);
      $('status').textContent=results.length+' songs found';
      return;
    }catch(e2){}
    err('Search failed. Check internet.');
    $('list').innerHTML='<div class="empty">No results. Check your connection.</div>';
  }
}

function renderList(arr){
  if(!arr||!arr.length){$('list').innerHTML='<div class="empty">No songs found</div>';return}
  $('list').innerHTML=arr.map((t,i)=>`<div class="item" data-i="${i}"><div class="th">${t.thumb?`<img src="${t.thumb}">`:''}</div><div class="info"><div class="t">${t.title}</div><div class="a">${t.artist}</div></div></div>`).join('');
  $('list').querySelectorAll('.item').forEach(el=>{
    el.onclick=()=>{const i=parseInt(el.dataset.i);if(!isNaN(i))playFromList(i)};
  });
}

// ===== PLAYBACK =====
async function getStream(id){
  try{
    let r=await fetch(API+'/streams/'+id);
    if(r.status!==200)throw new Error();
    let d=await r.json();
    let as=d.audioStreams?.find(s=>s.mimeType?.startsWith('audio/webm'))||d.audioStreams?.find(s=>s.mimeType?.startsWith('audio/mp4'))||d.audioStreams?.[0];
    if(as?.url)return as.url;
    // Try native bridge
    if(window.MediaBridge){let u=window.MediaBridge.getStreamUrl(id);if(u)return u}
    return d.videoStreams?.[0]?.url||'';
  }catch(e){
    // Fallback
    try{
      let r=await fetch('https://pipedapi.syncpundit.io/streams/'+id);
      let d=await r.json();
      let as=d.audioStreams?.[0];
      return as?.url||'';
    }catch(e2){return''}
  }
}

async function playTrack(track){
  if(!track||!track.id){err('Invalid track');return}
  currentTrack=track;playing=true;
  $('status').textContent='Loading stream...';
  let u=await getStream(track.id);
  if(!u){err('Cannot play this song');playing=false;return}
  if(!audio){
    audio=new Audio();
    audio.onended=()=>nextTrack();
    audio.onerror=()=>{err('Playback error');nextTrack()};
  }
  try{audio.src=u;await audio.play()}catch(e){err('Play failed');playing=false;return}
  if(navigator.wakeLock)try{navigator.wakeLock.request('screen')}catch(e){}
  $('player').style.display='flex';
  $('pth').innerHTML=track.thumb?`<img src="${track.thumb}">`:'';
  $('pt').textContent=track.title;
  $('pa').textContent=track.artist;
  $('playBtn').innerHTML='&#9646;&#9646;';
  try{if(window.MediaBridge)window.MediaBridge.startBgService(track.id)}catch(e){}
  updateFavBtn();
}

function togglePlay(){
  if(!audio||!currentTrack)return;
  if(audio.paused){audio.play();playing=true;$('playBtn').innerHTML='&#9646;&#9646;'}
  else{audio.pause();playing=false;$('playBtn').innerHTML='&#9654;'}
}

function nextTrack(){
  if(queue.length){qIdx=(qIdx+1)%queue.length;playTrack(queue[qIdx])}
  else{let idx=results.findIndex(t=>t.id===(currentTrack?.id));if(idx>=0&&idx<results.length-1)playTrack(results[idx+1]);else if(results.length)playTrack(results[0])}
}

function prevTrack(){
  if(queue.length){qIdx=(qIdx-1+queue.length)%queue.length;playTrack(queue[qIdx])}
  else{let idx=results.findIndex(t=>t.id===(currentTrack?.id));if(idx>0)playTrack(results[idx-1])}
}

function playFromList(i){
  window._src=results;
  if(queue.length){queue=[];qIdx=0}
  playTrack(results[i]);
}

let _src=results;
$('playBtn').onclick=togglePlay;
$('nextBtn').onclick=nextTrack;
$('prevBtn').onclick=prevTrack;

// ===== CHIPS =====
document.querySelectorAll('.chip').forEach(c=>{
  c.onclick=async()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    await search(c.dataset.q);
  };
});

// ===== SEARCH =====
$('searchBtn').onclick=async()=>{
  let q=$('searchInput').value.trim();
  if(!q)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  await search(q);
};
$('searchInput').onkeydown=e=>{if(e.key==='Enter')$('searchBtn').click()};

// ===== LOGIN =====
let isLoginMode=true;
$('loginBtn').onclick=()=>{$('loginScreen').style.display='flex'};
$('loginClose').onclick=()=>{$('loginScreen').style.display='none'};
$('loginToggle').onclick=(e)=>{e.preventDefault();isLoginMode=!isLoginMode;$('loginSubmitBtn').textContent=isLoginMode?'Sign In':'Sign Up';$('loginToggle').textContent=isLoginMode?'Create account':'Sign in'};
$('loginSubmitBtn').onclick=async()=>{
  if(!authFirebase){toast('Firebase loading...');return}
  let email=$('loginEmail').value.trim(),pass=$('loginPass').value;
  if(!email||!pass){$('loginError').textContent='Email and password required';$('loginError').style.display='block';return}
  $('loginError').style.display='none';
  try{
    let cred=isLoginMode?await authFirebase.signInWithEmailAndPassword(email,pass):await authFirebase.createUserWithEmailAndPassword(email,pass);
    user=cred.user;
    if(!isLoginMode&&dbFirebase)dbFirebase.collection('users').doc(user.uid).set({email,createdAt:firebase.firestore.FieldValue.serverTimestamp(),isPremium:false}).catch(()=>{});
    $('loginBtn').textContent=user.email?.split('@')[0]||'User';
    $('loginBtn').style.background='#2ecc71';
    $('loginScreen').style.display='none';
    toast('Logged in!');
    loadFavs();
  }catch(e){$('loginError').textContent=e.message;$('loginError').style.display='block'}
};

// ===== FAVORITES =====
async function toggleFav(track){
  if(!authFirebase||!user){toast('Login to save favorites');return}
  try{
    let ref=dbFirebase.collection('users').doc(user.uid).collection('favorites').doc(track.id);
    let idx=favs.findIndex(f=>f.id===track.id);
    if(idx>=0){favs.splice(idx,1);await ref.delete();toast('Removed from favorites')}
    else{favs.unshift(track);await ref.set({...track,addedAt:firebase.firestore.FieldValue.serverTimestamp()});toast('Added to favorites')}
    updateFavBtn();
  }catch(e){}
}
function updateFavBtn(){}

async function loadFavs(){
  if(!authFirebase||!user)return;
  try{
    let snap=await dbFirebase.collection('users').doc(user.uid).collection('favorites').orderBy('addedAt','desc').get();
    favs=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){}
}

// ===== FIREBASE DYNAMIC =====
setTimeout(()=>{
  if(typeof firebase!=='undefined'){initFB();return}
  let s=document.createElement('script');
  s.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
  s.onload=()=>{
    let a=document.createElement('script');a.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js';
    let f=document.createElement('script');f.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
    let c=0;a.onload=f.onload=()=>{c++;if(c>=2)initFB()};
    document.head.append(a,f);
  };
  document.head.append(s);
},100);

function initFB(){
  try{
    if(!firebase.apps.length)firebase.initializeApp({apiKey:'AIzaSyAFwUYmVsKE_SSxRBoGxsTFFXclJjSAfl0',authDomain:'yt-mood-player-naman.firebaseapp.com',projectId:'yt-mood-player-naman',storageBucket:'yt-mood-player-naman.firebasestorage.app',messagingSenderId:'79051163289',appId:'1:79051163289:web:b6bd4ba9508b495678da08'});
    authFirebase=firebase.auth();dbFirebase=firebase.firestore();
    authFirebase.onAuthStateChanged(async u=>{
      user=u;
      if(u){$('loginBtn').textContent=u.email?.split('@')[0]||'User';$('loginBtn').style.background='#2ecc71';loadFavs()}
      else{$('loginBtn').textContent='Login';$('loginBtn').style.background='#e94560'}
    });
  }catch(e){}
}

// ===== AUTO LOAD MUSIC ON START =====
setTimeout(()=>search('bollywood hits trending 2026'),300);

// ===== UPDATE CHECK =====
fetch('https://raw.githubusercontent.com/namanmali808-cpu/moodflow-player/main/version.json').then(r=>r.json()).then(d=>{
  if(d.version&&d.version!=='1.8.4'&&d.apkUrl)setTimeout(()=>{
    if(confirm('Update v'+d.version+' available. Download?')){try{if(window.MediaBridge)window.MediaBridge.downloadApk(d.apkUrl);else window.open(d.apkUrl,'_system')}catch(e){}}
  },8000);
}).catch(()=>{});

// ===== NATIVE CALLBACKS =====
function mediaOnPlay(){togglePlay()}
function mediaOnPause(){togglePlay()}
function mediaOnNext(){nextTrack()}
function mediaOnPrev(){prevTrack()}
function sk(){nextTrack()}

console.log('MoodFlow ready');
</script>
</body>
</html>
