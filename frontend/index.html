<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MoodFlow Music</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#08080f;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:manipulation}
#splash{position:fixed;inset:0;background:#08080f;display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
#splash.hide{opacity:0;pointer-events:none}
#splash h1{font-size:2rem;background:linear-gradient(135deg,#e94560,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#splash .sp{width:32px;height:32px;border:3px solid #2a2a4a;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}

header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#12121e;border-bottom:1px solid #2a2a4a}
header h1{font-size:1.2rem;flex:1;background:linear-gradient(135deg,#e94560,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header button{background:none;border:none;color:#fff;font-size:1.2rem;padding:6px 10px;border-radius:8px;cursor:pointer}

.search-wrap{display:flex;gap:6px;padding:10px 16px}
.search-wrap input{flex:1;padding:10px 14px;border:1px solid #2a2a4a;border-radius:10px;background:#12121e;color:#fff;font-size:14px;outline:none}
.search-wrap input:focus{border-color:#e94560}
.search-wrap button{padding:10px 16px;border:none;border-radius:10px;background:#e94560;color:#fff;cursor:pointer;font-size:14px}

.chips{display:flex;gap:6px;padding:4px 16px;overflow-x:auto;scrollbar-width:none}
.chip{padding:6px 16px;border-radius:20px;background:#1a1a2e;border:1px solid #2a2a4a;font-size:13px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.chip.on{background:#e94560;border-color:#e94560}

.list{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;background:#12121e;cursor:pointer;transition:background .2s}
.item:active{background:#1a1a2e}
.item .th{width:40px;height:40px;border-radius:6px;background:#2a2a4a;flex-shrink:0;overflow:hidden}
.item .th img{width:100%;height:100%;object-fit:cover}
.item .info{flex:1;min-width:0}
.item .info .t{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .info .a{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#status{padding:6px 16px;font-size:12px;color:#888;min-height:20px}

.player{display:flex;align-items:center;gap:10px;padding:10px 16px 14px;background:#12121e;border-top:1px solid #2a2a4a}
.player .th{width:40px;height:40px;border-radius:6px;background:#2a2a4a;flex-shrink:0;overflow:hidden}
.player .th img{width:100%;height:100%;object-fit:cover}
.player .info{flex:1;min-width:0}
.player .info .t{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player .info .a{font-size:11px;color:#888}
.player .ctrl{display:flex;gap:6px;align-items:center}
.player .ctrl button{background:none;border:none;color:#fff;font-size:1.3rem;padding:6px 10px;cursor:pointer;border-radius:8px}
.player .ctrl .pp{color:#e94560;font-size:1.8rem}
.player .ctrl button:active{background:rgba(255,255,255,.1)}

.empty{text-align:center;color:#666;padding:2rem;font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #2a2a4a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:100;transition:opacity .3s;pointer-events:none}
.toast.hide{opacity:0}

#updateScreen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(20px)}
#updateScreen.show{display:flex}
.update-box{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:2rem;width:100%;max-width:340px;text-align:center}
.update-box h2{color:#e94560;margin-bottom:8px}
.update-box p{color:#888;font-size:13px;margin-bottom:16px}
.update-box button{width:100%;padding:14px;border:none;border-radius:10px;background:#e94560;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div id="splash"><div><h1>MoodFlow</h1><div class="sp"></div></div></div>

<header>
  <h1>MoodFlow</h1>
</header>

<div class="search-wrap">
  <input id="searchInput" placeholder="Search any song..." autocomplete="off">
  <button id="searchBtn">Search</button>
</div>

<div class="chips" id="chipBar">
  <span class="chip on" data-q="bollywood hits">Bollywood</span>
  <span class="chip" data-q="punjabi songs">Punjabi</span>
  <span class="chip" data-q="english hits">English</span>
  <span class="chip" data-q="lofi chill">Lofi</span>
  <span class="chip" data-q="romantic songs">Romantic</span>
  <span class="chip" data-q="party songs">Party</span>
</div>

<div id="status">Search or tap a mood</div>

<div class="list" id="list"></div>

<div class="player" id="player" style="display:none">
  <div class="th" id="pth"></div>
  <div class="info">
    <div class="t" id="pt">No track</div>
    <div class="a" id="pa"></div>
  </div>
  <div class="ctrl">
    <button id="prevBtn">&#9664;&#9664;</button>
    <button id="playBtn" class="pp">&#9654;</button>
    <button id="nextBtn">&#9654;&#9654;</button>
  </div>
</div>

<div id="updateScreen">
  <div class="update-box">
    <h2>Update Available</h2>
    <p id="updateText">New version available</p>
    <button id="updateBtn" onclick="doUpdate()">Download Update</button>
  </div>
</div>

<div id="toast" class="toast hide"></div>

<script>
// ===== SPLASH HIDE =====
document.getElementById('splash').classList.add('hide');

// ===== STATE =====
let currentTrack=null,playing=false,audio=null,results=[],queue=[],qIdx=0;
let user=null,favs=[];
let nativePlaying=false,updateChecked=false,updateCheckAttempts=0,updateInfo=null;
const $=id=>document.getElementById(id);
const API='https://pipedapi.kavin.rocks';
const toast=(msg)=>{const e=$('toast');if(!e)return;e.textContent=msg;e.classList.remove('hide');clearTimeout(e._h);e._h=setTimeout(()=>e.classList.add('hide'),3000)};
const err=(msg)=>{toast(msg);$('status').textContent=msg};

// ===== SEARCH =====
async function search(q){
  $('status').textContent='Searching...';
  $('list').innerHTML='<div class="empty">Searching...</div>';
  try{
    let r=await fetch(API+'/search?q='+encodeURIComponent(q)+'&filter=videos');
    if(r.status!==200)throw new Error();
    let d=await r.json();
    results=(d.items||[]).map(i=>({id:(i.url||'').split('v=')[1]?.split('&')[0]||'',title:i.title||'Unknown',artist:i.uploaderName||i.uploader||'Unknown',thumb:i.thumbnail||'',dur:i.duration||0}));
    renderList(results);
    $('status').textContent=results.length+' songs found';
  }catch(e){
    try{
      let r=await fetch('https://pipedapi.syncpundit.io/search?q='+encodeURIComponent(q)+'&filter=videos');
      if(r.status!==200)throw new Error();
      let d=await r.json();
      results=(d.items||[]).map(i=>({id:(i.url||'').split('v=')[1]?.split('&')[0]||'',title:i.title||'Unknown',artist:i.uploaderName||i.uploader||'Unknown',thumb:i.thumbnail||'',dur:i.duration||0}));
      renderList(results);
      $('status').textContent=results.length+' songs found';
      return;
    }catch(e2){}
    err('Search failed');
    $('list').innerHTML='<div class="empty">No results</div>';
  }
}

function renderList(arr){
  if(!arr||!arr.length){$('list').innerHTML='<div class="empty">No songs found</div>';return}
  $('list').innerHTML=arr.map((t,i)=>`<div class="item" data-i="${i}"><div class="th">${t.thumb?`<img src="${t.thumb}">`:''}</div><div class="info"><div class="t">${t.title}</div><div class="a">${t.artist}</div></div></div>`).join('');
  $('list').querySelectorAll('.item').forEach(el=>{el.onclick=()=>{const i=parseInt(el.dataset.i);if(!isNaN(i))playFromList(i)}});
}

function syncPlaying(p){
  try{if(window.MediaBridge&&window.MediaBridge.setPlaying)window.MediaBridge.setPlaying(p)}catch(e){}
}
function onNativeAudioStart(){
  nativePlaying=true;
  try{if(audio)audio.pause()}catch(e){}
}

// ===== PLAYBACK =====
async function getStream(id){
  try{
    if(window.MediaBridge){let u=window.MediaBridge.getStreamUrl(id);if(u)return u}
  }catch(e){}
  try{
    let r=await fetch(API+'/streams/'+id);
    if(r.status!==200)throw new Error();
    let d=await r.json();
    let as=d.audioStreams?.find(s=>s.mimeType?.startsWith('audio/webm'))||d.audioStreams?.find(s=>s.mimeType?.startsWith('audio/mp4'))||d.audioStreams?.[0];
    if(as?.url)return as.url;
    return d.videoStreams?.[0]?.url||'';
  }catch(e){
    try{
      let r=await fetch('https://pipedapi.syncpundit.io/streams/'+id);
      let d=await r.json();
      let as=d.audioStreams?.[0];
      return as?.url||'';
    }catch(e2){return''}
  }
}

async function playTrack(track){
  if(!track||!track.id){err('Invalid');return}
  currentTrack=track;playing=true;qIdx=queue.findIndex(t=>t.id===track.id);
  if(!audio){
    audio=new Audio();
    audio.onended=()=>{if(queue.length>1)nextTrack();else{playing=false;updateUI()}};
    audio.onerror=()=>{if(queue.length>1)nextTrack()};
    audio.onplay=()=>syncPlaying(true);
    audio.onpause=()=>syncPlaying(false);
  }
  $('status').textContent='Loading...';
  let u='';
  try{if(window.MediaBridge){let nu=window.MediaBridge.getStreamUrl(track.id);if(nu)u=nu}}catch(e){}
  if(!u)u=await getStream(track.id);
  if(!u){err('Cannot play');playing=false;updateUI();return}
  try{audio.src=u;await audio.play()}catch(e){err('Play failed');playing=false;updateUI();return}
  try{if(window.MediaBridge)window.MediaBridge.startBgService(track.id)}catch(e){}
  try{if(window.MediaBridge&&window.MediaBridge.playStreamingUrl&&u)window.MediaBridge.playStreamingUrl(u)}catch(e){}
  nativePlaying=false;
  $('player').style.display='flex';
  $('pth').innerHTML=track.thumb?`<img src="${track.thumb}">`:'';
  $('pt').textContent=track.title;
  $('pa').textContent=track.artist;
  updateUI();
  updateMediaSession(track);
}

function updateUI(){$('playBtn').innerHTML=playing?'&#9646;&#9646;':'&#9654;'}

function togglePlay(){
  if(!audio||!currentTrack)return;
  if(nativePlaying){
    if(playing){
      if(window.MediaBridge&&window.MediaBridge.stopNativePlayback)window.MediaBridge.stopNativePlayback();
      nativePlaying=false;playing=false;
    }else{nativePlaying=false;audio.play().then(()=>{playing=true}).catch(()=>{})}
    updateUI();syncPlaying(playing);return
  }
  if(audio.paused){audio.play();playing=true}else{audio.pause();playing=false}
  updateUI();syncPlaying(playing)
}

function nextTrack(){
  if(queue.length>1){qIdx=(qIdx+1)%queue.length;playTrack(queue[qIdx])}
  else{
    let idx=results.findIndex(t=>t.id===(currentTrack?.id));
    if(idx>=0&&idx<results.length-1)playTrack(results[idx+1]);
    else if(results.length)playTrack(results[0]);
    else err('No more songs')
  }
}

function prevTrack(){
  if(queue.length>1){qIdx=(qIdx-1+queue.length)%queue.length;playTrack(queue[qIdx])}
  else{
    let idx=results.findIndex(t=>t.id===(currentTrack?.id));
    if(idx>0)playTrack(results[idx-1]);
    else if(results.length)playTrack(results[results.length-1])
  }
}

function playFromList(i){
  if(!results[i])return;
  queue=[];qIdx=0;
  playTrack(results[i])
}

function sk(){nextTrack()}
function prv(){prevTrack()}

// ===== SWIPE =====
(function(){
  var sx=0,st=0;
  document.addEventListener('touchstart',function(e){
    if(!e.target.closest('.player'))return;
    sx=e.touches[0].screenX;st=Date.now()
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!sx)return;
    var dx=e.changedTouches[0].screenX-sx,dt=Date.now()-st;
    sx=0;
    if(dt>400||Math.abs(dx)<40)return;
    if(dx>0)prevTrack();else nextTrack()
  },{passive:true})
})();

// ===== MEDIA SESSION =====
function updateMediaSession(track){
  try{
    navigator.mediaSession.metadata=new MediaMetadata({title:track.title||'MoodFlow',artist:track.artist||'',artwork:[{src:'https://img.youtube.com/vi/'+track.id+'/mqdefault.jpg',sizes:'320x180',type:'image/jpeg'}]});
    navigator.mediaSession.playbackState='playing';
    navigator.mediaSession.setActionHandler('play',function(){mediaOnPlay()});
    navigator.mediaSession.setActionHandler('pause',function(){mediaOnPause()});
    navigator.mediaSession.setActionHandler('nexttrack',function(){nextTrack()});
    navigator.mediaSession.setActionHandler('previoustrack',function(){prevTrack()});
  }catch(e){}
}

// ===== NATIVE CALLBACKS =====
function mediaOnPlay(){
  if(nativePlaying){syncPlaying(true);return}
  togglePlay()
}
function mediaOnPause(){
  if(nativePlaying){syncPlaying(false);return}
  togglePlay()
}
function mediaOnNext(){nextTrack()}
function mediaOnPrev(){prevTrack()}

// ===== EVENT BINDINGS =====
$('playBtn').onclick=togglePlay;
$('nextBtn').onclick=nextTrack;
$('prevBtn').onclick=prevTrack;

document.querySelectorAll('.chip').forEach(c=>{
  c.onclick=async()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    await search(c.dataset.q);
  };
});

$('searchBtn').onclick=async()=>{
  let q=$('searchInput').value.trim();
  if(!q)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  await search(q);
};
$('searchInput').onkeydown=e=>{if(e.key==='Enter')$('searchBtn').click()};

// ===== AUTO LOAD =====
setTimeout(()=>search('bollywood hits trending'),500);

// ===== UPDATE CHECK =====
function checkUpdate(){
  if(updateChecked||updateCheckAttempts>=10)return;
  updateCheckAttempts++;
  if(window.MediaBridge&&window.MediaBridge.checkLatestRelease){
    window.MediaBridge.checkLatestRelease();
  }else{
    setTimeout(checkUpdate,1500);
  }
}
function onUpdateCheck(tag,apkUrl,notes){
  if(updateChecked)return;
  var curVer=getAppVersion();
  if(curVer==='0.0.0'||!isNewerVersion(tag,curVer))return;
  updateChecked=true;updateInfo={tag,apkUrl,notes};
  $('updateText').textContent='v'+tag.replace(/^v/i,'')+' ready: '+(notes||'Update now');
  $('updateScreen').classList.add('show');
}
function getAppVersion(){
  try{if(window.MediaBridge&&window.MediaBridge.getVersionName)return window.MediaBridge.getVersionName()}catch(e){}
  return '0.0.0';
}
function isNewerVersion(tag,cur){
  var a=tag.replace(/^v/i,'').split('.').map(Number);
  var b=cur.split('.').map(Number);
  for(var i=0;i<Math.max(a.length,b.length);i++){
    var na=a[i]||0,nb=b[i]||0;
    if(na>nb)return true;
    if(na<nb)return false;
  }
  return false;
}
function doUpdate(){
  if(!updateInfo||!updateInfo.apkUrl)return;
  if(window.MediaBridge&&window.MediaBridge.downloadApk){
    window.MediaBridge.downloadApk(updateInfo.apkUrl);
    $('updateBtn').textContent='Downloading...';
    $('updateBtn').disabled=true;
    return;
  }
  window.open(updateInfo.apkUrl,'_system');
}
setTimeout(checkUpdate,5000);
setTimeout(checkUpdate,12000);

console.log('MoodFlow ready');
</script>
</body>
</html>
