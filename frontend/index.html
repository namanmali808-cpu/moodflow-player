<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MoodFlow Music</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#08080f;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#splash{position:fixed;inset:0;background:#08080f;display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
#splash.hide{opacity:0;pointer-events:none}
#splash h1{font-size:2rem;background:linear-gradient(135deg,#e94560,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#splash .sp{width:32px;height:32px;border:3px solid #2a2a4a;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#12121e;border-bottom:1px solid #2a2a4a}
header h1{font-size:1.2rem;flex:1;background:linear-gradient(135deg,#e94560,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-wrap{display:flex;gap:6px;padding:10px 16px}
.search-wrap input{flex:1;padding:10px 14px;border:1px solid #2a2a4a;border-radius:10px;background:#12121e;color:#fff;font-size:14px;outline:none}
.search-wrap input:focus{border-color:#e94560}
.search-wrap button{padding:10px 16px;border:none;border-radius:10px;background:#e94560;color:#fff;cursor:pointer;font-size:14px}
.chips{display:flex;gap:6px;padding:4px 16px;overflow-x:auto;scrollbar-width:none}
.chip{padding:6px 16px;border-radius:20px;background:#1a1a2e;border:1px solid #2a2a4a;font-size:13px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.chip.on{background:#e94560;border-color:#e94560}
.list{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;background:#12121e;cursor:pointer}
.item:active{background:#1a1a2e}
.item .th{width:40px;height:40px;border-radius:6px;background:#2a2a4a;flex-shrink:0;overflow:hidden}
.item .th img{width:100%;height:100%;object-fit:cover}
.item .info{flex:1;min-width:0}
.item .info .t{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .info .a{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#status{padding:6px 16px;font-size:12px;color:#888;min-height:20px}
.player{display:flex;align-items:center;gap:10px;padding:10px 16px 14px;background:#12121e;border-top:1px solid #2a2a4a;touch-action:none}
.player .th{width:40px;height:40px;border-radius:6px;background:#2a2a4a;flex-shrink:0;overflow:hidden}
.player .th img{width:100%;height:100%;object-fit:cover}
.player .info{flex:1;min-width:0}
.player .info .t{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player .info .a{font-size:11px;color:#888}
.player .ctrl{display:flex;gap:6px;align-items:center}
.player .ctrl button{background:none;border:none;color:#fff;font-size:1.3rem;padding:6px 10px;cursor:pointer;border-radius:8px}
.player .ctrl .pp{color:#e94560;font-size:1.8rem}
.player .ctrl button:active{background:rgba(255,255,255,.1)}
.empty{text-align:center;color:#666;padding:2rem;font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #2a2a4a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:100;transition:opacity .3s;pointer-events:none}
.toast.hide{opacity:0}
#updateScreen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(20px)}
#updateScreen.show{display:flex}
.update-box{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:2rem;width:100%;max-width:340px;text-align:center}
.update-box h2{color:#e94560;margin-bottom:8px}
.update-box p{color:#888;font-size:13px;margin-bottom:16px}
.update-box button{width:100%;padding:14px;border:none;border-radius:10px;background:#e94560;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div id="splash"><div><h1>MoodFlow</h1><div class="sp"></div></div></div>

<header><h1>MoodFlow</h1></header>

<div class="search-wrap">
  <input id="si" placeholder="Search any song..." autocomplete="off">
  <button id="sb">Search</button>
</div>

<div class="chips" id="chips">
  <span class="chip on" data-q="bollywood hits">Bollywood</span>
  <span class="chip" data-q="punjabi songs">Punjabi</span>
  <span class="chip" data-q="english hits">English</span>
  <span class="chip" data-q="lofi chill">Lofi</span>
  <span class="chip" data-q="romantic songs">Romantic</span>
  <span class="chip" data-q="party songs">Party</span>
</div>

<div id="st">Search or tap a mood</div>

<div class="list" id="list"></div>

<div class="player" id="player" style="display:none" ontouchstart="swipeStart(event)" ontouchend="swipeEnd(event)">
  <div class="th" id="pth"></div>
  <div class="info">
    <div class="t" id="pt">No track</div>
    <div class="a" id="pa"></div>
  </div>
  <div class="ctrl">
    <button onclick="prevTrack()">◄◄</button>
    <button class="pp" id="pp" onclick="togglePlay()">►</button>
    <button onclick="nextTrack()">►►</button>
  </div>
</div>

<div id="updateScreen">
  <div class="update-box">
    <h2>Update Available</h2>
    <p id="ut">New version available. Please update to continue.</p>
    <button onclick="doUpdate()">Update Now</button>
  </div>
</div>

<div id="toast" class="toast hide"></div>

<script>
// ===== UTILS =====
var currentTrack=null,currentIdx=-1,playing=false,audio=null,results=[],queue=[],qIdx=0;
var nativePlaying=false,updateChecked=false,updateAttempts=0,updateInfo=null;
var swiping=false,swipeX=0;
var loadingTrack=false;
function $(i){return document.getElementById(i)}
function toast(m){var e=$('toast');if(!e)return;e.textContent=m;e.classList.remove('hide');clearTimeout(e._h);e._h=setTimeout(function(){e.classList.add('hide')},3000)}
function err(m){toast(m);$('st').textContent=m}

// ===== SEARCH =====
function search(q){
  $('st').textContent='Searching...';
  $('list').innerHTML='<div class="empty">Searching...</div>';
  var u='https://pipedapi.kavin.rocks/search?q='+encodeURIComponent(q)+'&filter=videos';
  fetch(u).then(function(r){
    if(r.status!==200)throw Error();
    return r.json();
  }).then(function(d){
    results=(d.items||[]).map(function(i){
      var vid='';
      try{vid=i.url.split('v=')[1].split('&')[0]}catch(e){}
      return{id:vid,title:i.title||'Unknown',artist:i.uploaderName||i.uploader||'Unknown',thumb:i.thumbnail||'',dur:i.duration||0}
    });
    renderList(results);
    $('st').textContent=results.length+' songs found';
  }).catch(function(){
    fetch('https://pipedapi.syncpundit.io/search?q='+encodeURIComponent(q)+'&filter=videos').then(function(r){
      if(r.status!==200)throw Error();
      return r.json();
    }).then(function(d){
      results=(d.items||[]).map(function(i){
        var vid='';
        try{vid=i.url.split('v=')[1].split('&')[0]}catch(e){}
        return{id:vid,title:i.title||'Unknown',artist:i.uploaderName||i.uploader||'Unknown',thumb:i.thumbnail||'',dur:i.duration||0}
      });
      renderList(results);
      $('st').textContent=results.length+' songs found';
    }).catch(function(){
      err('Search failed');
      $('list').innerHTML='<div class="empty">Search failed</div>';
    });
  });
}

function renderList(arr){
  if(!arr||!arr.length){$('list').innerHTML='<div class="empty">No songs found</div>';return}
  var h='';
  for(var i=0;i<arr.length;i++){
    var t=arr[i];
    h+='<div class="item" onclick="playFromList('+i+')"><div class="th">'+(t.thumb?'<img src="'+t.thumb+'">':'')+'</div><div class="info"><div class="t">'+t.title+'</div><div class="a">'+t.artist+'</div></div></div>';
  }
  $('list').innerHTML=h;
}

// ===== STREAM =====
function getStream(id){
  return new Promise(function(resolve){
    try{
      if(window.MediaBridge){var u=window.MediaBridge.getStreamUrl(id);if(u){resolve(u);return}}
    }catch(e){}
    fetch('https://pipedapi.kavin.rocks/streams/'+id).then(function(r){
      if(r.status!==200)throw Error();
      return r.json();
    }).then(function(d){
      var as=d.audioStreams;
      if(as&&as.length){
        for(var i=0;i<as.length;i++){
          if(as[i].mimeType&&as[i].mimeType.indexOf('audio/webm')>=0){resolve(as[i].url);return}
        }
        resolve(as[0].url);return;
      }
      if(d.videoStreams&&d.videoStreams.length){resolve(d.videoStreams[0].url);return}
      resolve('');
    }).catch(function(){
      fetch('https://pipedapi.syncpundit.io/streams/'+id).then(function(r){return r.json()}).then(function(d){
        if(d.audioStreams&&d.audioStreams.length){resolve(d.audioStreams[0].url);return}
        resolve('');
      }).catch(function(){resolve('')});
    });
  });
}

// ===== PLAYBACK =====
function playTrack(track){
  if(!track||!track.id){err('Invalid');return}
  currentTrack=track;playing=true;
  qIdx=-1;
  for(var i=0;i<queue.length;i++){if(queue[i].id===track.id){qIdx=i;break}}
  
  $('player').style.display='flex';
  $('pth').innerHTML=track.thumb?'<img src="'+track.thumb+'">':'';
  $('pt').textContent=track.title;
  $('pa').textContent=track.artist;
  updateUI();
  updateMediaSession(track);
  $('st').textContent='Loading stream...';
  
  getStream(track.id).then(function(u){
    if(!u){err('Cannot get stream');playing=false;updateUI();return}
    $('st').textContent='Starting playback...';
    nativePlaying=false;
    var hasNative=false;
    try{
      if(window.MediaBridge){
        window.MediaBridge.startBgService(track.id);
        window.MediaBridge.playStreamingUrl(u);
        hasNative=true;
      }
    }catch(e){}
    if(!hasNative){
      if(!audio){
        audio=new Audio();
        audio.onended=function(){
          if(queue.length>1)nextTrack();
          else{playing=false;updateUI()}
        };
        audio.onerror=function(){
          if(queue.length>1)nextTrack()
        };
      }
      try{audio.src=u;audio.play();$('st').textContent='Playing'}catch(e){err('Play failed')}
    }else{
      $('st').textContent='Playing (native)'
    }
  }).catch(function(e){
    err('Failed to load: '+(e.message||'unknown'))
  });
}

function updateUI(){
  try{
    var btn=$('pp');
    if(btn)btn.innerHTML=playing?'⏸':'►';
    if(currentTrack&&playing){
      var st=$('st');
      if(st)st.textContent='Playing: '+currentTrack.title;
    }
  }catch(e){}
}

function togglePlay(){
  try{
    if(!currentTrack){toast('No track loaded');return}
    if(nativePlaying){
      try{
        if(window.MediaBridge&&window.MediaBridge.stopNativePlayback){
          window.MediaBridge.stopNativePlayback();
          playing=false;nativePlaying=false;
          updateUI();syncPlaying(false);
          return
        }
      }catch(e){}
      nativePlaying=false;
      if(audio){if(audio.paused){audio.play();playing=true}else{audio.pause();playing=false}}
      syncPlaying(playing);updateUI();return
    }
    if(window.MediaBridge&&window.MediaBridge.setPlaying){
      playing=!playing;
      window.MediaBridge.setPlaying(playing);
      updateUI();return
    }
    if(!audio){toast('Audio not ready');return}
    if(audio.paused){audio.play();playing=true}else{audio.pause();playing=false}
    updateUI();syncPlaying(playing)
  }catch(e){console.error('togglePlay',e)}
}

function nextTrack(){try{doNext()}catch(e){err('nextTrack:'+e.message)}}
function prevTrack(){try{doPrev()}catch(e){err('prevTrack:'+e.message)}}

function playFromList(i){
  if(!results[i])return;
  queue=[];qIdx=0;
  currentIdx=i;
  playTrack(results[i])
}

function doNext(){
  if(queue.length>1){qIdx=(qIdx+1)%queue.length;playTrack(queue[qIdx])}
  else if(results.length>1){
    if(currentIdx>=0&&currentIdx<results.length-1)currentIdx++;
    else currentIdx=0;
    playTrack(results[currentIdx])
  }else toast('Queue empty')
}

function doPrev(){
  if(queue.length>1){qIdx=(qIdx-1+queue.length)%queue.length;playTrack(queue[qIdx])}
  else if(results.length>1){
    if(currentIdx>0)currentIdx--;
    else currentIdx=results.length-1;
    playTrack(results[currentIdx])
  }else toast('Queue empty')
}

function sk(){nextTrack()}
function prv(){prevTrack()}

function syncPlaying(p){
  try{if(window.MediaBridge&&window.MediaBridge.setPlaying)window.MediaBridge.setPlaying(p)}catch(e){}
}

function onNativeAudioStart(){
  nativePlaying=true;
  try{if(audio)audio.pause()}catch(e){}
}

// ===== SWIPE =====
function swipeStart(e){
  if(e.target.closest('button')){swiping=false;return}
  swiping=true;
  swipeX=e.touches[0].screenX;
}
function swipeEnd(e){
  try{
    if(!swiping||!swipeX)return;
    var dx=e.changedTouches[0].screenX-swipeX;
    swiping=false;swipeX=0;
    if(Math.abs(dx)<60)return;
    if(dx>0)prevTrack();else nextTrack();
  }catch(e){}
}

// ===== MEDIA SESSION =====
function updateMediaSession(track){
  try{
    navigator.mediaSession.metadata=new MediaMetadata({title:track.title||'MoodFlow',artist:track.artist||''});
    navigator.mediaSession.playbackState='playing';
    navigator.mediaSession.setActionHandler('play',function(){if(nativePlaying){syncPlaying(true);return}togglePlay()});
    navigator.mediaSession.setActionHandler('pause',function(){if(nativePlaying){syncPlaying(false);return}togglePlay()});
    navigator.mediaSession.setActionHandler('nexttrack',function(){nextTrack()});
    navigator.mediaSession.setActionHandler('previoustrack',function(){prevTrack()});
  }catch(e){}
}

// ===== EVENTS =====
$('sb').onclick=function(){
  var q=$('si').value.trim();
  if(!q)return;
  var chips=document.querySelectorAll('.chip');
  for(var i=0;i<chips.length;i++)chips[i].classList.remove('on');
  search(q);
};
$('si').onkeydown=function(e){if(e.key==='Enter')$('sb').click()};

var chips=document.querySelectorAll('.chip');
for(var i=0;i<chips.length;i++){
  chips[i].onclick=function(){
    var c=document.querySelectorAll('.chip');
    for(var j=0;j<c.length;j++)c[j].classList.remove('on');
    this.classList.add('on');
    search(this.dataset.q);
  };
}

// ===== INIT =====
$('splash').classList.add('hide');
setTimeout(function(){search('bollywood hits trending')},500);

// ===== UPDATE =====
function checkRelease(){
  if(updateChecked||updateAttempts>=10)return;
  updateAttempts++;
  if(window.MediaBridge&&window.MediaBridge.checkLatestRelease){
    window.MediaBridge.checkLatestRelease();
  }else{
    setTimeout(checkRelease,1500);
  }
}
function onUpdateCheck(tag,apkUrl){
  if(updateChecked)return;
  var cv='0.0.0';
  try{if(window.MediaBridge&&window.MediaBridge.getVersionName)cv=window.MediaBridge.getVersionName()}catch(e){}
  if(cv==='0.0.0')return;
  tag=(tag||'').replace(/^v/i,'');
  var at=tag.split('.'),bt=cv.split('.');
  for(var i=0;i<Math.max(at.length,bt.length);i++){
    var na=parseInt(at[i])||0,nb=parseInt(bt[i])||0;
    if(na>nb){
      updateChecked=true;
      updateInfo={tag:tag,apkUrl:apkUrl};
      $('ut').textContent='Version '+tag+' is now available. Please update to continue.';
      $('updateScreen').classList.add('show');
      return;
    }
    if(na<nb)return;
  }
}
function doUpdate(){
  if(!updateInfo||!updateInfo.apkUrl)return;
  if(window.MediaBridge&&window.MediaBridge.downloadApk){
    window.MediaBridge.downloadApk(updateInfo.apkUrl);
    $('updateBtn').textContent='Downloading...';
    $('updateBtn').disabled=true;
  }
}
setTimeout(checkRelease,5000);
setTimeout(checkRelease,12000);

console.log('MoodFlow ready v1.9.2');
</script>
</body>
</html>
